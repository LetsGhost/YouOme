services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youome-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://admin:admin@mongo:27017/youome-dev?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-your_password}
      BYPASS_AUTH: ${BYPASS_AUTH:-true}
      DISABLE_EMAIL_VERIFICATION: ${DISABLE_EMAIL_VERIFICATION:-true}
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_BUCKET: ${GARAGE_BUCKET:-avatars}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY_ID:-}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET_ACCESS_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      - youome-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: youome-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_INITDB_AUTH_SOURCE: ${MONGO_AUTH_SOURCE:-admin}
    volumes:
      - mongo-data:/data/db
    networks:
      - youome-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: youome-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-your_password}
    volumes:
      - redis-data:/data
    networks:
      - youome-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-compatible object storage (avatars/group images). Needs ./garage/garage.toml
  # (gitignored - copy from garage.toml.example and fill in the two secrets first
  # run). Run ./garage/init-garage.ps1 (PowerShell) once after first `up` to
  # bootstrap the layout/bucket/key - see that script's header for details.
  # (infra/deploy/init-garage.sh is the equivalent for the prod stack.)
  garage:
    image: dxflrs/garage:v1.0.1
    container_name: youome-garage
    restart: unless-stopped
    ports:
      - "3900:3900" # S3 API
      - "3903:3903" # admin API (layout/key/bucket management)
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    networks:
      - youome-network
    healthcheck:
      # The image is FROM scratch (static binary only, no shell/wget/curl), so
      # the healthcheck has to exec the garage binary itself rather than curl
      # an HTTP endpoint.
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  redis-data:
  garage-meta:
  garage-data:

networks:
  youome-network:
    driver: bridge