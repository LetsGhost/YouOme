# nginx server config for the YouOme production stack.
#
# Mounted read-only into the `nginx` service at /etc/nginx/conf.d (see
# docker-compose.prod.yml). The base image's own conf.d/default.conf is
# replaced entirely by this file since the whole directory is bind-mounted.
#
# REPLACE "YOUR_DOMAIN" BELOW with the real domain before first deploy.
#
# NOTE: this file assumes a certificate already exists at
# /etc/letsencrypt/live/YOUR_DOMAIN/. On a brand-new server that will not be
# true yet - see the "Production (Docker)" section in ../README.md (or
# ../deploy/init-certbot.sh) for the one-time bootstrap step that swaps in
# nginx/bootstrap.conf, obtains the first certificate, then restores this file.

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript
           application/x-javascript text/xml application/xml application/xml+rss
           text/javascript image/svg+xml;

# Plain HTTP: serve ACME challenges unredirected (required for certbot's
# HTTP-01 validation), redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    root /var/www/static;
    index index.html;

    # Certbot renewal also validates over HTTPS in some flows; keep this
    # available here too.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Reverse-proxy the API to the backend service (Docker Compose service
    # name resolves on the shared "backend" network).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI/JSON is only mounted when the backend runs with
    # NODE_ENV=development (see backend/CLAUDE.md), so this will 404 in a
    # normal production deploy - proxied anyway in case it's ever enabled.
    location /api-docs {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Router SPA: serve static files, fall back to index.html for any
    # non-file route so client-side routing works on refresh/deep-link.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
