# Temporary HTTP-only nginx config used ONLY during first-time certbot
# bootstrap, before a Let's Encrypt certificate exists (see
# ../deploy/init-certbot.sh and the "Production (Docker)" section of
# ../README.md). It serves the ACME challenge, the API, and the built
# frontend all over plain HTTP so certbot's webroot validation can succeed.
#
# Do NOT use this as the permanent config - swap default.conf back in once
# the certificate has been issued.
#
# REPLACE "YOUR_DOMAIN" BELOW with the real domain.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    root /var/www/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
